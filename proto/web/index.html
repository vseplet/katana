<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <title>katana · screen share</title>
  <style>
    html, body {
      margin: 0;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      /* Фиксируем поверхность как «приложение»: без прокрутки, pull-to-refresh,
         pinch-zoom, выделения текста и iOS long-press callout. */
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      font: 13px/1.3 -apple-system, system-ui, sans-serif;
      color: #eee;
    }

    /* Панель — исключение: оставляем жесты/прокрутку/перетаскивание рабочими. */
    .lil-gui {
      touch-action: auto;
    }
    video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      transform-origin: 0 0; /* для зум/пан трансформа вьюпорта */
    }
    #status {
      position: fixed;
      top: 12px;
      left: 12px;
      padding: 6px 10px;
      color: #ddd;
      background: rgba(0, 0, 0, 0.55);
      border-radius: 6px;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    /* Лента открытых приложений (вверху). Скроллится пальцем; тап = на передний
       план на хосте. Прячется в режиме управления. */
    #apps {
      position: fixed;
      /* в одном ряду с HUD (внизу слева), справа от его трёх кнопок */
      left: calc(env(safe-area-inset-left) + 184px);
      right: 12px;
      bottom: max(12px, env(safe-area-inset-bottom));
      height: 48px;
      display: flex;
      align-items: center;
      gap: 6px;
      overflow-x: auto;
      overflow-y: hidden;
      white-space: nowrap;
      z-index: 9;
      touch-action: pan-x; /* разрешаем горизонтальный скролл ленты */
      scrollbar-width: none;
    }
    #apps::-webkit-scrollbar { display: none; }
    #apps.hidden { display: none; }
    #apps button {
      flex: 0 0 auto;
      padding: 7px 14px;
      font: 13px -apple-system, system-ui, sans-serif;
      color: #eee;
      background: rgba(30, 30, 34, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      touch-action: manipulation;
    }
    #apps button:active { background: rgba(60, 60, 66, 0.9); }

    /* HUD-кластер в левом нижнем углу: управление / фуллскрин / reset view. */
    #hud {
      position: fixed;
      left: max(12px, env(safe-area-inset-left));
      bottom: max(12px, env(safe-area-inset-bottom));
      display: flex;
      gap: 8px;
      z-index: 10;
    }
    #hud button {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #eee;
      background: rgba(20, 20, 22, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 12px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      touch-action: manipulation;
    }
    #hud button svg { width: 22px; height: 22px; }
    #hud button:active { background: rgba(40, 40, 44, 0.85); }
    /* Активный режим управления — заметная подсветка. */
    #btn-control.active {
      color: #fff;
      background: rgba(70, 160, 90, 0.85);
      border-color: rgba(120, 230, 150, 0.9);
    }

    /* Цветовые акценты папок панели — чтобы блоки различались с одного взгляда. */
    .lil-gui .f-capture > .title {
      border-left: 4px solid #4aa3ff;
      background: linear-gradient(90deg, rgba(74, 163, 255, 0.18), transparent 60%);
    }
    .lil-gui .f-receive > .title {
      border-left: 4px solid #46c46a;
      background: linear-gradient(90deg, rgba(70, 196, 106, 0.18), transparent 60%);
    }
    .lil-gui .f-stats > .title {
      border-left: 4px solid #e0a23b;
      background: linear-gradient(90deg, rgba(224, 162, 59, 0.18), transparent 60%);
    }
    .lil-gui .f-perms > .title {
      border-left: 4px solid #c061cb;
      background: linear-gradient(90deg, rgba(192, 97, 203, 0.18), transparent 60%);
    }
    .lil-gui .f-input > .title {
      border-left: 4px solid #3bd6c0;
      background: linear-gradient(90deg, rgba(59, 214, 192, 0.18), transparent 60%);
    }

    /* Пара кнопок в один ряд внутри панели. */
    .lil-gui .btn-row {
      display: flex;
      gap: 4px;
      padding: 2px 6px 4px;
    }
    .lil-gui .btn-row button {
      flex: 1;
      padding: 5px 6px;
      font: inherit;
      color: #ddd;
      background: #2a2a2e;
      border: 1px solid #454549;
      border-radius: 5px;
      cursor: pointer;
    }
    .lil-gui .btn-row button:hover {
      background: #35353b;
    }
    .lil-gui .btn-row button:active {
      background: #1f1f23;
    }
  </style>
</head>
<body>
  <video id="screen" autoplay playsinline muted></video>
  <div id="status">connecting…</div>
  <div id="apps"></div>
  <div id="hud">
    <button id="btn-control" title="Управление мышью (вкл/выкл)" aria-label="control">
      <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 16 16">
        <path d="M8 3a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 3m4 8a4 4 0 0 1-8 0V5a4 4 0 1 1 8 0zM8 0a5 5 0 0 0-5 5v6a5 5 0 0 0 10 0V5a5 5 0 0 0-5-5"/>
      </svg>
    </button>
    <button id="btn-fullscreen" title="Fullscreen" aria-label="fullscreen">
      <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 16 16">
        <path fill-rule="evenodd" d="M5.828 10.172a.5.5 0 0 0-.707 0l-4.096 4.096V11.5a.5.5 0 0 0-1 0v3.975a.5.5 0 0 0 .5.5H4.5a.5.5 0 0 0 0-1H1.732l4.096-4.096a.5.5 0 0 0 0-.707m4.344 0a.5.5 0 0 1 .707 0l4.096 4.096V11.5a.5.5 0 1 1 1 0v3.975a.5.5 0 0 1-.5.5H11.5a.5.5 0 0 1 0-1h2.768l-4.096-4.096a.5.5 0 0 1 0-.707m0-4.344a.5.5 0 0 0 .707 0l4.096-4.096V4.5a.5.5 0 1 0 1 0V.525a.5.5 0 0 0-.5-.5H11.5a.5.5 0 0 0 0 1h2.768l-4.096 4.096a.5.5 0 0 0 0 .707m-4.344 0a.5.5 0 0 1-.707 0L1.025 1.732V4.5a.5.5 0 0 1-1 0V.525a.5.5 0 0 1 .5-.5H4.5a.5.5 0 0 1 0 1H1.732l4.096 4.096a.5.5 0 0 1 0 .707"/>
      </svg>
    </button>
    <button id="btn-reset" title="Reset view" aria-label="reset view">
      <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 16 16">
        <path fill-rule="evenodd" d="M8 3a5 5 0 1 1-4.546 2.914.5.5 0 0 0-.908-.417A6 6 0 1 0 8 2z"/>
        <path d="M8 4.466V.534a.25.25 0 0 0-.41-.192L5.23 2.308a.25.25 0 0 0 0 .384l2.36 1.966A.25.25 0 0 0 8 4.466"/>
      </svg>
    </button>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
